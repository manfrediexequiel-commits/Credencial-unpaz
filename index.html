<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Credencial UNPAZ</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; background-color: #f0f2f5; }
        .form-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin: 20px; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        
        /* Diseño de la Credencial */
        .card { width: 350px; height: 500px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2); position: relative; border: 1px solid #ddd; }
        .header { background: white; padding: 15px; text-align: center; }
        .header img { width: 180px; }
        .career-banner { background: #002350; color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .photo-space { width: 120px; height: 150px; background: #eee; margin: 20px auto; border: 2px solid #002350; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .photo-space img { width: 100%; height: 100%; object-fit: cover; }
        .info { text-align: center; padding: 10px; }
        .info h2 { margin: 5px 0; color: #333; font-size: 1.2em; }
        .info p { margin: 2px 0; color: #666; font-size: 0.9em; }
        .footer-tag { position: absolute; bottom: 20px; width: 100%; text-align: center; font-weight: bold; font-size: 1.5em; color: #333; }
    </style>
</head>
<body>

    <div class="form-container">
        <h3>Datos de la Credencial</h3>
        <input type="text" id="inNombre" placeholder="Nombre y Apellido" oninput="updateCard()">
        <input type="text" id="inDni" placeholder="DNI" oninput="updateCard()">
        <input type="text" id="inLegajo" placeholder="Legajo" oninput="updateCard()">
        <p style="font-size: 12px; color: gray;">Sube tu foto:</p>
        <input type="file" accept="image/*" onchange="loadFile(event)">
    </div>

    <div class="card" id="credential">
        <div class="header">
            <img src="https://unpaz.edu.ar/sites/default/files/unpaz_logo_0.png" alt="UNPAZ">
        </div>
        <div class="career-banner">
            Licenciatura en Enfermería (DCSyD)
        </div>
        <div class="photo-space" id="photoContainer">
            <span style="color: #999;">FOTO</span>
        </div>
        <div class="info">
            <h2 id="dispNombre">NOMBRE APELLIDO</h2>
            <p>DNI: <span id="dispDni">XXXXXXXX</span></p>
            <p>Legajo: <span id="dispLegajo">000000</span></p>
        </div>
        <div class="footer-tag">Estudiante</div>
    </div>

    <script>
        function updateCard() {
            document.getElementById('dispNombre').innerText = document.getElementById('inNombre').value.toUpperCase() || "NOMBRE APELLIDO";
            document.getElementById('dispDni').innerText = document.getElementById('inDni').value || "XXXXXXXX";
            document.getElementById('dispLegajo').innerText = document.getElementById('inLegajo').value || "000000";
        }

        var loadFile = function(event) {
            var output = document.getElementById('photoContainer');
            output.innerHTML = `<img src="${URL.createObjectURL(event.target.files[0])}">`;
        };
    </script>
</body>
</html>
